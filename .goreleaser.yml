version: 2
builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}"
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
    binary: "{{ .ProjectName }}_v{{ .Version }}"
archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

changelog:
  use: "git"
  abbrev: -1
  sort: "asc"
  filters:
    # Exclude commits that are internal/maintenance noise — consumers don't need these.
    # Keep: feat, fix, perf, security (and breaking variants marked with !)
    exclude:
      - "^chore"
      - "^ci"
      - "^docs"
      - "^refactor"
      - "^style"
      - "^test"
      - "^build"
      - "^revert"
      - "^fix\\(docs\\)"
      - "^fix\\(review\\)"
      - "^fix\\(skill\\)"
      - "^fix\\(tests\\)"
      - "Merge pull request"
      - "Merge branch"
      - "^WIP"
  groups:
    # Breaking changes surface first — matched by the conventional-commit "!" marker.
    - title: "🚨 Breaking Changes"
      regexp: '^.+!:.+'
      order: 0
    - title: "🔒 Security"
      regexp: '^security(\(.+\))?:'
      order: 1
    - title: "✨ New Features"
      regexp: '^feat(\(.+\))?:'
      order: 2
    - title: "🔧 Bug Fixes"
      regexp: '^fix(\(.+\))?:'
      order: 3
    - title: "⚡ Performance"
      regexp: '^perf(\(.+\))?:'
      order: 4
    # Catch-all: anything not excluded above and not matched by a group above.
    # In practice this should be empty given the filter list, but acts as a safety net.
    - title: "Other"
      order: 99